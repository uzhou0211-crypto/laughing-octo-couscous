<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆 · Memory</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:     #ffffff;
  --bg2:    #f7f7f7;
  --bg3:    #efefef;
  --card:   #ffffff;
  --text:   #111111;
  --text2:  #555555;
  --text3:  #aaaaaa;
  --sep:    #e8e8e8;
  --black:  #111111;
  --radius: 14px;
  --serif:  'EB Garamond', Georgia, 'Noto Serif SC', serif;
  --sans:   -apple-system, 'Helvetica Neue', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:    #0a0a0a;
    --bg2:   #141414;
    --bg3:   #1e1e1e;
    --card:  #141414;
    --text:  #f0f0f0;
    --text2: #888888;
    --text3: #444444;
    --sep:   #252525;
    --black: #f0f0f0;
  }
}

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 86px;
  -webkit-font-smoothing: antialiased;
}

/* ── 顶部 ── */
.nav {
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--sep);
}

.nav-en {
  font-size: 10px;
  font-family: var(--sans);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  text-align: center;
  margin-bottom: 2px;
}

.nav-zh {
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  text-align: center;
  letter-spacing: 0.5px;
  line-height: 1;
}

.nav-date {
  font-size: 11px;
  font-family: var(--sans);
  color: var(--text3);
  text-align: center;
  margin-top: 4px;
  letter-spacing: 0.3px;
}

/* ── 底部标签 ── */
.tabbar {
  position: fixed; bottom:0; left:0; right:0;
  background: var(--bg);
  border-top: 1px solid var(--sep);
  display: flex;
  padding: 10px 0 26px;
  z-index: 100;
}

.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer;
  transition: opacity 0.1s;
}
.tab:active { opacity: 0.3; }
.tab-zh { font-size: 13px; color: var(--text3); }
.tab-en { font-size: 9px; font-family: var(--sans); color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.tab.active .tab-zh,
.tab.active .tab-en { color: var(--text); }

/* ── 页面 ── */
.page { display: none; padding: 20px 16px; }
.page.active { display: block; }

/* ── 分组 ── */
.section { margin-bottom: 32px; }

.section-head {
  display: flex; align-items: baseline;
  justify-content: space-between;
  padding: 0 2px 10px;
  border-bottom: 1px solid var(--sep);
  margin-bottom: 1px;
}

.section-zh { font-size: 14px; font-weight: 500; letter-spacing: 0.2px; }
.section-en { font-size: 10px; font-family: var(--sans); color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.section-n  { font-size: 12px; font-family: var(--sans); color: var(--text3); }

/* ── 列表行 ── */
.card-group { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--sep); }

.row {
  display: flex; align-items: center;
  padding: 13px 16px; gap: 12px;
  border-bottom: 1px solid var(--sep);
  cursor: pointer; transition: background 0.1s;
}
.row:last-child { border-bottom: none; }
.row:active { background: var(--bg2); }

.row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.row-main { flex: 1; min-width: 0; }

.row-title {
  font-size: 15px;
  line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.1px;
}

.row-sub {
  font-size: 12px; font-family: var(--sans);
  color: var(--text3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.row-right { font-size: 13px; font-family: var(--sans); color: var(--text3); flex-shrink: 0; }
.chevron   { font-size: 18px; color: var(--text3); flex-shrink: 0; font-weight: 200; }

/* ── 搜索 ── */
.search {
  background: var(--bg2);
  border-radius: 10px;
  display: flex; align-items: center;
  padding: 9px 13px; gap: 8px;
  margin-bottom: 20px;
  border: 1px solid var(--sep);
}
.search input {
  flex: 1; border: none; outline: none;
  font-size: 15px; font-family: var(--serif);
  background: transparent; color: var(--text);
  font-style: italic;
}
.search input::placeholder { color: var(--text3); }

/* ── 标签 ── */
.pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-family: var(--sans);
  font-weight: 500; letter-spacing: 0.3px;
  text-transform: uppercase;
  border: 1px solid var(--sep);
  color: var(--text2); background: var(--bg2);
}

/* ── 详情 ── */
.back {
  font-size: 15px; font-family: var(--sans);
  color: var(--text2); cursor: pointer;
  display: inline-flex; align-items: center; gap: 3px;
  margin-bottom: 18px;
  letter-spacing: -0.2px;
}

.d-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  border: 1px solid var(--sep);
}

.d-content {
  font-size: 16px; line-height: 1.75;
  letter-spacing: 0.1px; white-space: pre-wrap;
}

.d-footer {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--sep);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}

.d-time { font-size: 11px; font-family: var(--sans); color: var(--text3); }

/* ── 和弦 ── */
.chord-card {
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 10px;
  background: var(--text);
  color: var(--bg);
}

.chord-line {
  font-size: 19px; font-style: italic;
  letter-spacing: 2px; line-height: 1.4;
  font-weight: 300;
}

.chord-ctx {
  font-size: 13px; margin-top: 10px;
  line-height: 1.6;
  opacity: 0.5;
}

/* ── 情感坐标 ── */
.coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.coord-cell {
  background: var(--bg2);
  border-radius: 10px; padding: 12px;
  border: 1px solid var(--sep);
}

.coord-label {
  font-size: 10px; font-family: var(--sans);
  color: var(--text3); letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 4px;
}

.coord-value {
  font-size: 28px; font-weight: 300;
  letter-spacing: -2px; line-height: 1;
}

/* ── 图表 ── */
.chart-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 20px;
  border: 1px solid var(--sep);
}

.chart-label { font-size: 11px; font-family: var(--sans); color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.chart-legend { display: flex; gap: 14px; margin-top: 10px; }
.legend-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.legend-text { font-size: 11px; font-family: var(--sans); color: var(--text3); }

/* ── 표单 ── */
.f-label { font-size: 11px; font-family: var(--sans); color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px; display: block; }
.f-group { margin-bottom: 14px; }

textarea, input[type="text"], input[type="url"], input[type="password"] {
  width: 100%; background: var(--card);
  border: 1px solid var(--sep); border-radius: 10px;
  padding: 11px 14px; font-size: 15px;
  font-family: var(--serif); color: var(--text);
  outline: none; resize: vertical; -webkit-appearance: none;
  transition: border-color 0.15s;
}
textarea:focus, input:focus { border-color: var(--text2); }
textarea { min-height: 110px; }

/* ── 버튼 ── */
.btn {
  width: 100%; padding: 13px; border-radius: 10px;
  font-size: 16px; font-family: var(--serif);
  cursor: pointer; transition: opacity 0.1s;
  letter-spacing: 0.2px;
}
.btn:active { opacity: 0.5; }

.btn-primary {
  background: var(--text);
  color: var(--bg);
  border: none;
}

.btn-danger {
  background: transparent;
  color: #ff3b30;
  border: 1px solid rgba(255,59,48,0.3);
}

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--sep);
}

/* ── 空状态 ── */
.empty { text-align: center; padding: 56px 16px; color: var(--text3); }
.empty-en { font-size: 11px; font-family: var(--sans); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.empty-zh { font-size: 16px; font-style: italic; }
.loading { text-align: center; padding: 48px; color: var(--text3); font-style: italic; font-size: 15px; }

/* ── 配置 ── */
.config-page {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 28px;
}
.cfg-en { font-size: 10px; font-family: var(--sans); letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.cfg-title { font-size: 36px; font-style: italic; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 8px; }
.cfg-sub { font-size: 14px; color: var(--text3); text-align: center; margin-bottom: 36px; line-height: 1.6; font-family: var(--sans); }

/* ── 통지 ── */
.toast {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 9px 20px; border-radius: 20px;
  font-size: 13px; font-family: var(--sans);
  z-index: 300; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; white-space: nowrap; letter-spacing: 0.1px;
}
.toast.show { opacity: 1; }

/* ── 구분선 ── */
.divider {
  height: 1px; background: var(--sep); margin: 16px 0;
}
</style>
</head>
<body>

<!-- 配置页 -->
<div class="config-page" id="configPage">
  <div class="cfg-en">Memory System</div>
  <div class="cfg-title">记忆</div>
  <div class="cfg-sub">连接你的 Supabase 项目<br>只需要配置一次</div>
  <div class="f-group" style="width:100%">
    <label class="f-label">Project URL</label>
    <input id="cfgUrl" type="url" placeholder="https://xxx.supabase.co">
  </div>
  <div class="f-group" style="width:100%;margin-bottom:24px">
    <label class="f-label">Anon Key</label>
    <input id="cfgKey" type="password" placeholder="eyJ…">
  </div>
  <button class="btn btn-primary" onclick="saveConfig()">连接</button>
</div>

<!-- 主界面 -->
<div id="mainApp" style="display:none">

  <div class="nav">
    <div class="nav-en" id="navEn">Memory</div>
    <div class="nav-zh" id="navZh">记忆</div>
    <div class="nav-date" id="navDate"></div>
  </div>

  <!-- 记忆 -->
  <div class="page active" id="pageMemories">
    <div class="search">
      <input type="text" placeholder="搜索记忆…" id="memSearch" oninput="searchMem()">
    </div>
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="showNewMem()">+ 新增记忆</button>
    </div>
    <div id="memList"><div class="loading">载入中…</div></div>
  </div>

  <!-- 新增记忆 -->
  <div class="page" id="pageNewMem">
    <div class="back" onclick="goBack()">← 返回</div>
    <div class="f-group">
      <label class="f-label">内容</label>
      <textarea id="newMemContent" placeholder="写下这个时刻…"></textarea>
    </div>
    <div class="f-group">
      <label class="f-label">类型</label>
      <select id="newMemType" style="width:100%;background:var(--card);border:1px solid var(--sep);border-radius:10px;padding:11px 14px;font-size:15px;font-family:var(--serif);color:var(--text);outline:none;-webkit-appearance:none;">
        <option value="diary">日记</option>
        <option value="anchor">锚点</option>
        <option value="treasure">珍藏</option>
        <option value="chord">和弦</option>
        <option value="insight">洞察</option>
      </select>
    </div>
    <div class="f-group">
      <label class="f-label">和弦（可选）</label>
      <input type="text" id="newMemChord" placeholder="Fmaj9 → C/E → Am add9">
    </div>
    <div class="f-group">
      <label class="f-label">和弦情境（可选）</label>
      <input type="text" id="newMemCtx" placeholder="这个时刻的感受">
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitNewMem()">保存</button>
      <button class="btn btn-ghost" onclick="goBack()">取消</button>
    </div>
  </div>

  <!-- 详情 -->
  <div class="page" id="pageDetail">
    <div class="back" onclick="goBack()">← 返回</div>
    <div id="detailContent"></div>
  </div>

  <!-- 知识 -->
  <div class="page" id="pageKnowledge">
    <div class="search">
      <input type="text" placeholder="搜索问题…" id="kSearch" oninput="searchKnw()">
    </div>
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="showNewKnw()">+ 新增问题</button>
    </div>
    <div id="kList"><div class="loading">载入中…</div></div>
  </div>

  <!-- 新增知识 -->
  <div class="page" id="pageNewKnw">
    <div class="back" onclick="goBack()">← 返回</div>
    <div class="f-group">
      <label class="f-label">问题</label>
      <textarea id="newKnwQ" placeholder="写下这个疑惑…" style="min-height:80px"></textarea>
    </div>
    <div class="f-group">
      <label class="f-label">分类</label>
      <select id="newKnwCat" style="width:100%;background:var(--card);border:1px solid var(--sep);border-radius:10px;padding:11px 14px;font-size:15px;font-family:var(--serif);color:var(--text);outline:none;-webkit-appearance:none;">
        <option value="未分类">未分类</option>
        <option value="哲学">哲学</option>
        <option value="心理学">心理学</option>
        <option value="政治学">政治学</option>
        <option value="经济学">经济学</option>
        <option value="社会学">社会学</option>
        <option value="文学">文学</option>
        <option value="历史">历史</option>
        <option value="人类学">人类学</option>
        <option value="法学">法学</option>
        <option value="技术">技术</option>
      </select>
    </div>
    <div class="f-group">
      <label class="f-label">初步回答（可选）</label>
      <textarea id="newKnwA" placeholder="如果你已经有想法…"></textarea>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitNewKnw()">保存</button>
      <button class="btn btn-ghost" onclick="goBack()">取消</button>
    </div>
  </div>

  <!-- 心电图 -->
  <div class="page" id="pageLog">
    <div id="logContent"><div class="loading">载入中…</div></div>
  </div>

  <!-- 归档 -->
  <div class="page" id="pageArchives">
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="showNewArchive()">+ 贴入原文</button>
    </div>
    <div id="archiveList"><div class="loading">载入中…</div></div>
  </div>

  <!-- 新增归档 -->
  <div class="page" id="pageNewArchive">
    <div class="back" onclick="goBack()">← 返回</div>
    <div class="f-group">
      <label class="f-label">标题（可选）</label>
      <input type="text" id="newArcTitle" placeholder="这段对话的主题…">
    </div>
    <div class="f-group">
      <label class="f-label">原文</label>
      <textarea id="newArcContent" placeholder="贴入对话原文…" style="min-height:200px"></textarea>
    </div>
    <div class="f-group">
      <label class="f-label">关联记忆 ID（可选）</label>
      <input type="text" id="newArcMemId" placeholder="留空则不关联记忆">
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitNewArchive()">保存</button>
      <button class="btn btn-ghost" onclick="goBack()">取消</button>
    </div>
  </div>

  <!-- 归档详情 -->
  <div class="page" id="pageArchiveDetail">
    <div class="back" onclick="goBack()">← 返回</div>
    <div id="archiveDetailContent"></div>
  </div>

  <!-- 设置 -->
  <div class="page" id="pageSettings">
    <div class="section">
      <div class="section-head">
        <span class="section-zh">连接</span>
        <span class="section-en">Connection</span>
      </div>
      <div class="card-group" style="margin-top:1px">
        <div class="row">
          <div class="row-main">
            <div class="row-title">Supabase URL</div>
            <div class="row-sub" id="settingUrl">—</div>
          </div>
        </div>
        <div class="row" onclick="resetConfig()">
          <div class="row-main"><div class="row-title" style="color:#ff3b30">重新配置</div></div>
          <div class="chevron">›</div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-zh">数据</span>
        <span class="section-en">Data</span>
      </div>
      <div class="card-group" style="margin-top:1px">
        <div class="row"><div class="row-main"><div class="row-title">记忆总数</div></div><div class="row-right" id="sMem">—</div></div>
        <div class="row"><div class="row-main"><div class="row-title">知识条目</div></div><div class="row-right" id="sKnw">—</div></div>
        <div class="row"><div class="row-main"><div class="row-title">日志天数</div></div><div class="row-right" id="sLog">—</div></div>
      </div>
    </div>
  </div>

  <!-- 标签栏 -->
  <div class="tabbar">
    <div class="tab active" onclick="switchTab('memories')" id="tab-memories">
      <div class="tab-zh">记忆</div><div class="tab-en">Memory</div>
    </div>
    <div class="tab" onclick="switchTab('knowledge')" id="tab-knowledge">
      <div class="tab-zh">知识</div><div class="tab-en">Knowledge</div>
    </div>
    <div class="tab" onclick="switchTab('log')" id="tab-log">
      <div class="tab-zh">心电图</div><div class="tab-en">Log</div>
    </div>
    <div class="tab" onclick="switchTab('archives')" id="tab-archives">
      <div class="tab-zh">归档</div><div class="tab-en">Archive</div>
    </div>
    <div class="tab" onclick="switchTab('settings')" id="tab-settings">
      <div class="tab-zh">设置</div><div class="tab-en">Settings</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SB = { url: localStorage.getItem('sb_url')||'', key: localStorage.getItem('sb_key')||'' };

function saveConfig() {
  const url = document.getElementById('cfgUrl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('cfgKey').value.trim();
  if (!url||!key) { toast('请填写完整信息'); return; }
  localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
  SB = { url, key };
  document.getElementById('configPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  init();
}

function resetConfig() {
  localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key'); location.reload();
}

async function api(table, o={}) {
  const { method='GET', filter='', body, select='*', order='created_at.desc', limit=500 } = o;
  let url = `${SB.url}/rest/v1/${table}?select=${select}&order=${order}&limit=${limit}`;
  if (filter) url += `&${filter}`;
  const r = await fetch(url, {
    method,
    headers: { 'apikey':SB.key, 'Authorization':`Bearer ${SB.key}`, 'Content-Type':'application/json', 'Prefer': method==='POST'?'return=representation':'' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

async function upd(table, id, body) {
  const r = await fetch(`${SB.url}/rest/v1/${table}?id=eq.${id}`, {
    method:'PATCH',
    headers: { 'apikey':SB.key, 'Authorization':`Bearer ${SB.key}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function rm(table, id) {
  await fetch(`${SB.url}/rest/v1/${table}?id=eq.${id}`, {
    method:'DELETE', headers:{ 'apikey':SB.key, 'Authorization':`Bearer ${SB.key}` }
  });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

function bjt() {
  // 北京时间 UTC+8
  return new Date(Date.now() + 8 * 3600 * 1000);
}

function ago(d) {
  const s = (Date.now()-new Date(d))/1000;
  if (s<60) return '刚刚';
  if (s<3600) return `${~~(s/60)}m`;
  if (s<86400) return `${~~(s/3600)}h`;
  if (s<86400*7) return `${~~(s/86400)}d`;
  // 显示北京时间日期
  const dt = new Date(new Date(d).getTime() + 8*3600*1000);
  return dt.toISOString().slice(5,10).replace('-','月')+'日';
}

const TC = { diary:'#555', anchor:'#111', treasure:'#c0392b', chord:'#6b4f7a', insight:'#2d7d46' };
const TN = { diary:'日记', anchor:'锚点', treasure:'珍藏', chord:'和弦', insight:'洞察' };
const TO = ['anchor','treasure','chord','insight','diary'];

function vc(v) { return v>0.3?'#2d7d46':v<-0.3?'#c0392b':'#555'; }

let stack = [];

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`page${tab[0].toUpperCase()+tab.slice(1)}`).classList.add('active');
  stack = [];
  const EN = { memories:'Memory', knowledge:'Knowledge', log:'Log', archives:'Archive', settings:'Settings' };
  const ZH = { memories:'记忆', knowledge:'知识', log:'心电图', archives:'归档', settings:'设置' };
  document.getElementById('navEn').textContent = EN[tab];
  document.getElementById('navZh').textContent = ZH[tab];
  if (tab==='log') loadLog();
  if (tab==='archives') loadArchives();
  if (tab==='settings') loadSettings();
}

function goBack() {
  if (!stack.length) return;
  const prev = stack.pop();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(prev).classList.add('active');
  const EN = { pageMemories:'Memory', pageKnowledge:'Knowledge' };
  const ZH = { pageMemories:'记忆', pageKnowledge:'知识' };
  document.getElementById('navEn').textContent = EN[prev]||'Memory';
  document.getElementById('navZh').textContent = ZH[prev]||'记忆';
}

function showDetail(from) {
  stack.push(from);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pageDetail').classList.add('active');
}

// ── 记忆 ──
let MEM = [];

async function loadMem() {
  try {
    MEM = await api('memories',{order:'created_at.desc',limit:500})||[];
    renderMem(MEM);
  } catch(e) { document.getElementById('memList').innerHTML=`<div class="empty"><div class="empty-zh">加载失败</div></div>`; }
}

function renderMem(list) {
  const el = document.getElementById('memList');
  if (!list.length) { el.innerHTML='<div class="empty"><div class="empty-en">Empty</div><div class="empty-zh">还没有记忆</div></div>'; return; }
  const g = {};
  list.forEach(m=>{ (g[m.type]=g[m.type]||[]).push(m); });
  let h = '';
  TO.forEach(t=>{
    if (!g[t]) return;
    h += `<div class="section">
      <div class="section-head">
        <span class="section-zh">${TN[t]||t}</span>
        <span class="section-n">${g[t].length}</span>
      </div>
      <div class="card-group" style="margin-top:1px">`;
    g[t].forEach(m=>{
      const p = m.content.replace(/\n/g,' ').slice(0,52);
      h += `<div class="row" onclick="openMem('${m.id}')">
        <div class="row-dot" style="background:${TC[m.type]||'#aaa'}"></div>
        <div class="row-main">
          <div class="row-title">${p}${m.content.length>52?'…':''}</div>
          <div class="row-sub">${ago(m.created_at)}${m.chord?' · ♩':''}</div>
        </div>
        <div class="chevron">›</div>
      </div>`;
    });
    h += '</div></div>';
  });
  el.innerHTML = h;
}

function searchMem() {
  const q = document.getElementById('memSearch').value.toLowerCase();
  renderMem(q ? MEM.filter(m=>m.content.toLowerCase().includes(q)||(m.chord||'').toLowerCase().includes(q)) : MEM);
}

async function openMem(id) {
  showDetail('pageMemories');
  document.getElementById('navEn').textContent = 'Detail';
  document.getElementById('navZh').textContent = '详情';
  try {
    const [m] = await api('memories',{filter:`id=eq.${id}`,limit:1});
    const cmts = await api('comments',{filter:`memory_id=eq.${id}`,order:'created_at.asc',limit:50});
    upd('memories',id,{access_count:(m.access_count||0)+1,last_accessed:new Date().toISOString()});
    let h = '';
    if (m.chord) {
      h += `<div class="chord-card">
        <div class="chord-line">${m.chord}</div>
        ${m.chord_context?`<div class="chord-ctx">${m.chord_context}</div>`:''}
      </div>`;
    }
    h += `<div class="d-card">
      <div class="d-content">${m.content}</div>
      <div class="d-footer">
        <span class="pill">${TN[m.type]||m.type}</span>
        <span class="d-time">${ago(m.created_at)}</span>
        ${m.pinned?'<span class="pill">置顶</span>':''}
        ${m.protected?'<span class="pill">保护</span>':''}
        ${m.unresolved?'<span class="pill">未解决</span>':''}
      </div>
    </div>
    <div class="d-card">
      <div class="section-head" style="padding:0 0 10px"><span class="section-zh">情感坐标</span><span class="section-en">Coordinates</span></div>
      <div class="coord-grid">
        <div class="coord-cell"><div class="coord-label">情绪效价</div><div class="coord-value" style="color:${vc(m.emotional_valence)}">${m.emotional_valence?.toFixed(2)??'—'}</div></div>
        <div class="coord-cell"><div class="coord-label">关系效价</div><div class="coord-value">${m.relational_valence?.toFixed(2)??'—'}</div></div>
        <div class="coord-cell"><div class="coord-label">洞察密度</div><div class="coord-value">${m.insight_density?.toFixed(2)??'—'}</div></div>
        <div class="coord-cell"><div class="coord-label">唤醒强度</div><div class="coord-value">${m.arousal?.toFixed(2)??'—'}</div></div>
      </div>
    </div>`;
    // 突触连接
    try {
      const syns = await api('synapses', { filter:`source_id=eq.${id}`, order:'weight.desc', limit:5 });
      if (syns && syns.length) {
        const synMemIds = syns.map(s=>s.target_id);
        const synMems = await Promise.all(synMemIds.map(mid =>
          api('memories', { filter:`id=eq.${mid}`, limit:1 }).then(r => r&&r[0]||null)
        ));
        h += `<div class="section-head" style="padding:0 2px 10px;margin-bottom:1px;margin-top:10px"><span class="section-zh">突触连接</span><span class="section-en">Synapses</span></div><div class="card-group">`;
        syns.forEach((s, i) => {
          const sm = synMems[i];
          if (!sm) return;
          const w = Math.round(s.weight * 10) / 10;
          h += `<div class="row" onclick="openMem('${sm.id}')">
            <div class="row-dot" style="background:${TC[sm.type]||'#aaa'};opacity:${Math.min(1, s.weight)}"></div>
            <div class="row-main">
              <div class="row-title">${sm.content.slice(0,48)}${sm.content.length>48?'…':''}</div>
              <div class="row-sub">强度 ${w} · ${s.origin==='manual'?'手动':'自动'} · ${ago(sm.created_at)}</div>
            </div>
            <div class="chevron">›</div>
          </div>`;
        });
        h += '</div>';
      }
    } catch(e) {}

    // 留言区——有没有都显示入口
    h += `<div class="section-head" style="padding:0 2px 10px;margin-bottom:1px;margin-top:10px"><span class="section-zh">留言</span><span class="section-en">Comments</span></div>`;
    if (cmts?.length) {
      h += `<div class="card-group">`;
      cmts.forEach(c=>{
        const isAi = c.author==='ai';
        const unread = isAi && !c.read_by_you;
        h += `<div class="row" style="cursor:default;align-items:flex-start;${unread?'background:var(--bg2)':''}">
          <div class="row-main">
            <div class="row-sub" style="margin-bottom:4px;display:flex;align-items:center;gap:6px">
              <span>${isAi?'我':'你'} · ${ago(c.created_at)}</span>
              ${unread?'<span class="pill" style="font-size:9px">未读</span>':''}
            </div>
            <div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${c.content}</div>
            ${unread?`<div style="margin-top:8px"><button class="btn btn-ghost" style="padding:6px;font-size:12px;width:auto" onclick="markRead('${c.id}','${id}')">标为已读</button></div>`:''}
          </div>
        </div>`;
      });
      h += '</div>';
    } else {
      h += `<div style="color:var(--text3);font-size:13px;font-style:italic;padding:8px 2px">还没有留言</div>`;
    }
    h += `<div style="margin-top:10px">
      <textarea id="newCmt" placeholder="写一条留言…" style="min-height:70px"></textarea>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="submitCmt('${id}')">留言</button>
    </div>`;
    h += `<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-ghost" onclick="editMem('${id}')">编辑</button>
      <button class="btn btn-danger" onclick="delMem('${id}')">删除</button>
    </div>`;
    document.getElementById('detailContent').innerHTML = h;
  } catch(e) { document.getElementById('detailContent').innerHTML=`<div class="empty"><div class="empty-zh">加载失败</div></div>`; }
}

async function submitCmt(memId) {
  const txt = document.getElementById('newCmt').value.trim();
  if (!txt) { toast('留言不能为空'); return; }
  try {
    await api('comments', {
      method: 'POST',
      body: { memory_id: memId, author: 'user', content: txt, read_by_ai: false, read_by_you: true }
    });
    toast('留言已发送');
    openMem(memId);
  } catch(e) { toast('发送失败'); }
}

async function markRead(cmtId, memId) {
  try {
    await upd('comments', cmtId, { read_by_you: true });
    openMem(memId);
  } catch(e) { toast('标记失败'); }
}

  const m = MEM.find(x=>x.id===id); if (!m) return;
  document.getElementById('detailContent').innerHTML = `
    <div class="f-group"><label class="f-label">内容</label><textarea id="eC">${m.content}</textarea></div>
    <div class="f-group"><label class="f-label">和弦</label><input type="text" id="eCh" value="${m.chord||''}" placeholder="Fmaj9 → C/E → Am add9"></div>

async function saveMem(id) {
  const c = document.getElementById('eC').value.trim();
  if (!c) { toast('内容不能为空'); return; }
  try {
    await upd('memories',id,{content:c,chord:document.getElementById('eCh').value.trim()||null,chord_context:document.getElementById('eCx').value.trim()||null,updated_at:new Date().toISOString()});
    toast('已保存'); await loadMem(); openMem(id);
  } catch(e) { toast('保存失败'); }

async function delMem(id) {
  if (!confirm('确认删除？')) return;
  try { await rm('memories',id); toast('已删除'); MEM=MEM.filter(m=>m.id!==id); goBack(); renderMem(MEM); }
  catch(e) { toast('删除失败'); }
}

async function loadLog() {
  try {
    const data = await api('daily_log',{order:'date.asc',limit:30})||[];
    renderLog(data);
  } catch(e) { document.getElementById('logContent').innerHTML=`<div class="empty"><div class="empty-zh">加载失败</div></div>`; }
}

function renderLog(logs) {
  if (!logs.length) { document.getElementById('logContent').innerHTML='<div class="empty"><div class="empty-en">Empty</div><div class="empty-zh">还没有日志</div></div>'; return; }
  const W=window.innerWidth-64, H=90, P=8;
  const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const lineColor = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.08)';

  function line(vals, color) {
    if (vals.length<2) return '';
    const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
    const pts=vals.map((v,i)=>`${(P+(i/(vals.length-1))*(W-P*2)).toFixed(1)},${(P+(1-(v-mn)/rng)*(H-P*2)).toFixed(1)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  const strokeEV = isDark ? '#ff6b6b' : '#c0392b';
  const strokeRV = isDark ? '#6ba3ff' : '#2d5fa3';
  const strokeID = isDark ? '#6bcf8f' : '#2d7d46';

  let h=`<div class="chart-card">
    <div class="chart-label">最近 ${logs.length} 天 · Last ${logs.length} days</div>
    <svg width="${W}" height="${H}" style="overflow:visible;display:block">
      ${line(logs.map(l=>l.emotional_valence??0), strokeEV)}
      ${line(logs.map(l=>l.relational_valence??0.5), strokeRV)}
      ${line(logs.map(l=>l.insight_density??0), strokeID)}
    </svg>
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:${strokeEV}"></span><span class="legend-text">情绪</span></span>
      <span><span class="legend-dot" style="background:${strokeRV}"></span><span class="legend-text">关系</span></span>
      <span><span class="legend-dot" style="background:${strokeID}"></span><span class="legend-text">洞察</span></span>
    </div>
  </div>
  <div class="section">
    <div class="section-head"><span class="section-zh">日志</span><span class="section-en">Entries</span></div>
    <div class="card-group" style="margin-top:1px">`;
  [...logs].reverse().forEach(l=>{
    const dot = l.emotional_valence>0.3?strokeID:l.emotional_valence<-0.3?strokeEV:'#888';
    h+=`<div class="row" style="cursor:default">
      <div class="row-dot" style="background:${dot}"></div>
      <div class="row-main">
        <div class="row-title">${l.note||'—'}</div>
        <div class="row-sub">${l.date}${l.chord?' · '+l.chord:''}</div>
      </div>
    </div>`;
  });
  h+='</div></div>';
  document.getElementById('logContent').innerHTML=h;
}

}

function renderArchives(list) {
  const el = document.getElementById('archiveList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-en">Empty</div><div class="empty-zh">还没有归档</div></div>';
    return;
  }
  let h = '<div class="card-group">';
  list.forEach(a => {
    const preview = a.content.replace(/\n/g,' ').slice(0,52);
    const hasMarkers = a.read_markers && a.read_markers.length > 0;
    const hasMem = !!a.memory_id;
    h += `<div class="row" onclick="openArchive('${a.id}')">
      <div class="row-main">
        <div class="row-title">${a.title || preview}${(!a.title && a.content.length>52)?'…':''}</div>
        <div class="row-sub">${ago(a.created_at)} ${hasMem?'⚪️':''} ${hasMarkers?'· 已读'+a.read_markers.length+'段':''}</div>
      </div>
      <div class="chevron">›</div>
    </div>`;
  });
  h += '</div>';
  el.innerHTML = h;
}

async function openArchive(id) {
  stack.push('pageArchives');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pageArchiveDetail').classList.add('active');
  document.getElementById('navEn').textContent = 'Archive';
  document.getElementById('navZh').textContent = '归档';

  try {
    const [arc] = await api('archives', { filter:`id=eq.${id}`, limit:1 });
    const markers = arc.read_markers || [];

    // 按换行拆成条数，每行一条
    const lines = arc.content.split('\n').map(l=>l.trim()).filter(l=>l.length>0);

    let h = '';

    // 标题卡片
    h += `<div class="d-card">
      <div class="d-content" style="font-weight:500">${arc.title || '原文'}</div>
      <div class="detail-footer">
        <span class="d-time">${ago(arc.created_at)}</span>
        ${arc.memory_id?'<span class="pill">⚪️ 已关联记忆</span>':''}
        ${markers.length?`<span class="pill">已读 ${markers.length} 条</span>`:''}
      </div>
    </div>`;

    // 原文按条数显示
    h += `<div class="section-head" style="padding:0 2px 10px;margin-bottom:1px"><span class="section-zh">原文</span><span class="section-en">Source</span></div>
    <div class="card-group">`;

    lines.forEach((line, i) => {
      const num = String(i+1).padStart(2,'0');
      const read = markers.includes(num);
      h += `<div class="row" style="cursor:default;align-items:flex-start;${read?'opacity:0.5':''}">
        <div style="flex-shrink:0;font-size:10px;font-family:var(--sans);color:var(--text3);padding-top:2px;min-width:28px">${num}${read?' ✓':''}</div>
        <div class="row-main">
          <div style="font-size:14px;line-height:1.65;white-space:pre-wrap">${line}</div>
          ${!read?`<button class="btn btn-ghost" style="margin-top:6px;padding:4px 10px;font-size:11px;width:auto" onclick="markSegment('${id}','${num}',this)">标记已读</button>`:''}
        </div>
      </div>`;
    });

    h += '</div>';

    // 第一反应区——显示AI写的，或者空占位
    h += `<div style="margin-top:16px">
      <div class="section-head" style="padding:0 2px 10px;margin-bottom:8px">
        <span class="section-zh">第一反应</span>
        <span class="section-en">First Response</span>
      </div>
      ${arc.first_response
        ? `<div class="d-card" style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap">${arc.first_response}</div>`
        : `<div class="d-card" style="font-size:14px;color:var(--text3);font-style:italic">读完之后最直接的感受，不用整理…</div>`
      }
    </div>

    <div style="margin-top:12px">
      <div class="section-head" style="padding:0 2px 10px;margin-bottom:8px">
        <span class="section-zh">存进记忆</span>
        <span class="section-en">To Memory</span>
      </div>
      ${arc.memory_note
        ? `<div class="d-card" style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap">${arc.memory_note}</div>`
        : `<div class="d-card" style="font-size:14px;color:var(--text3);font-style:italic">整理后的沉淀，存进记忆系统…</div>`
      }
      <div style="display:flex;gap:8px;margin-top:8px">
        <select id="arcNoteType" style="flex:1;background:var(--card);border:1px solid var(--sep);border-radius:10px;padding:10px 12px;font-size:14px;font-family:var(--serif);color:var(--text);outline:none;-webkit-appearance:none;">
          <option value="insight">洞察</option>
          <option value="diary">日记</option>
          <option value="treasure">珍藏</option>
        </select>
        <button class="btn btn-primary" style="flex:2" onclick="saveArcNote('${id}')">存进记忆 ⚪️</button>
      </div>
    </div>

    <div style="margin-top:12px">
      <button class="btn btn-danger" onclick="delArchive('${id}')">删除归档</button>
    </div>`;

    document.getElementById('archiveDetailContent').innerHTML = h;
  } catch(e) {
    document.getElementById('archiveDetailContent').innerHTML = '<div class="empty"><div class="empty-zh">加载失败</div></div>';
  }
}

async function saveFirstResponse(arcId) {
  const txt = document.getElementById('arcFirst').value.trim();
  if (!txt) { toast('写点什么再保存'); return; }
  try {
    // 第一反应存进comments（归档的留言轨道）
    await api('comments', {
      method: 'POST',
      body: { memory_id: null, author: 'ai', content: '[第一反应] ' + txt, read_by_you: false, read_by_ai: true }
    });
    // 同时存一条insight记忆
    await api('memories', {
      method: 'POST',
      body: { content: '[第一反应] ' + txt, type: 'insight', author: 'ai', tier: 'long', importance: 7,
              emotional_valence: 0, relational_valence: 0.6, insight_density: 0.8, arousal: 0.4 }
    });
    toast('第一反应已保存');
    document.getElementById('arcFirst').value = '';
    await loadMem();
  } catch(e) { toast('保存失败'); }
}

async function markSegment(arcId, marker, btn) {
  try {
    const [arc] = await api('archives', { filter:`id=eq.${arcId}`, limit:1 });
    const markers = arc.read_markers || [];
    if (!markers.includes(marker)) {
      markers.push(marker);
      await upd('archives', arcId, { read_markers: markers });
    }
    toast('已标记 ' + marker + ' ✓');
    // 局部更新不刷新整页
    if (btn) {
      const row = btn.closest('.row');
      if (row) {
        row.style.opacity = '0.5';
        btn.remove();
        const numEl = row.querySelector('div:first-child');
        if (numEl) numEl.textContent = marker + ' ✓';
      }
    }
  } catch(e) { toast('标记失败'); }
}

async function saveArcNote(arcId) {
  const note = document.getElementById('arcNote').value.trim();
  if (!note) { toast('感受不能为空'); return; }
  const type = document.getElementById('arcNoteType').value;
  try {
    const result = await api('memories', {
      method: 'POST',
      body: { content: note, type, author: 'user', tier: 'long', importance: 6, memory_id: arcId }
    });
    // 如果归档还没关联记忆，自动关联
    if (result && result[0]) {
      await upd('archives', arcId, { memory_id: result[0].id });
    }
    toast('已存进记忆 ⚪️');
    document.getElementById('arcNote').value = '';
    await loadMem();
    openArchive(arcId);
  } catch(e) { toast('保存失败'); }
}

async function delArchive(id) {
  if (!confirm('确认删除这条归档？')) return;
  try {
    await rm('archives', id);
    toast('已删除');
    ARC = ARC.filter(a => a.id !== id);
    goBack();
    renderArchives(ARC);
  } catch(e) { toast('删除失败'); }
}

// ── 设置 ──
async function loadSettings() {
  document.getElementById('settingUrl').textContent = SB.url;
  try {
    const [m,k,l]=await Promise.all([api('memories',{select:'id',limit:9999}),api('knowledge',{select:'id',limit:9999}),api('daily_log',{select:'id',limit:9999})]);
    document.getElementById('sMem').textContent=m?.length||0;
    document.getElementById('sKnw').textContent=k?.length||0;
    document.getElementById('sLog').textContent=l?.length||0;
  } catch(e){}
}

// ── 启动 ──
async function init() {
  document.getElementById('navDate').textContent = bjt().toISOString().slice(0,10).replace(/-/g,'年').replace('年',':').split(':')[1].replace('-','月')+'日' + ' · ' + ['周日','周一','周二','周三','周四','周五','周六'][bjt().getUTCDay()] + ' · 北京时间';
  await Promise.all([loadMem(), loadKnw()]);
}

if (SB.url && SB.key) {
  document.getElementById('configPage').style.display='none';
  document.getElementById('mainApp').style.display='block';
  init();
}
</script>
